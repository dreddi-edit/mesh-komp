<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>MESH Loader Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; }
  
  .dark { background: #0a0a0a; }
  .light { background: #f0f0f0; }
  
  section { width: 100%; padding: 60px 40px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  h2 { color: #888; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; }
  
  .demos { display: flex; align-items: center; gap: 60px; flex-wrap: wrap; justify-content: center; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .demo span { color: #555; font-size: 12px; }
  
  .dark .demo span { color: #555; }
  
  /* Various sizes */
  #neon-20 { width: 20px; height: 20px; }
  #neon-40 { width: 40px; height: 40px; }
  #neon-80 { width: 80px; height: 80px; }
  #neon-160 { width: 160px; height: 160px; }
  
  #white-20 { width: 20px; height: 20px; }
  #white-40 { width: 40px; height: 40px; }
  #white-80 { width: 80px; height: 80px; }
  #white-160 { width: 160px; height: 160px; }
</style>
</head>
<body>

<section class="dark">
  <h2 style="color:#444">Neon Version — auf dunklem Hintergrund</h2>
  <div class="demos">
    <div class="demo"><div id="neon-20"></div><span>20px</span></div>
    <div class="demo"><div id="neon-40"></div><span>40px</span></div>
    <div class="demo"><div id="neon-80"></div><span>80px</span></div>
    <div class="demo"><div id="neon-160"></div><span>160px</span></div>
  </div>
</section>

<section class="light">
  <h2>Weiße Version — auf hellem Hintergrund</h2>
  <div class="demos">
    <div class="demo" style="background:#333; padding:12px; border-radius:8px;"><div id="white-20"></div><span style="color:#888">20px</span></div>
    <div class="demo" style="background:#333; padding:12px; border-radius:8px;"><div id="white-40"></div><span style="color:#888">40px</span></div>
    <div class="demo" style="background:#333; padding:12px; border-radius:8px;"><div id="white-80"></div><span style="color:#888">80px</span></div>
    <div class="demo" style="background:#333; padding:12px; border-radius:8px;"><div id="white-160"></div><span style="color:#888">160px</span></div>
  </div>
</section>

<script>
async function loadAnimation(containerId, jsonFile) {
  const resp = await fetch(jsonFile);
  const data = await resp.json();
  lottie.loadAnimation({
    container: document.getElementById(containerId),
    animationData: data,
    renderer: 'svg',
    loop: true,
    autoplay: true,
  });
}

// Inline the JSON directly so preview works standalone
const neonData = {"v":"5.7.4","fr":30,"ip":0,"op":60,"w":100,"h":100,"nm":"MESH Logo Loader","ddd":0,"assets":[],"layers":[{"ddd":0,"ind":1,"ty":4,"nm":"Logo","sr":1,"ks":{"o":{"a":0,"k":100},"r":{"a":1,"k":[{"t":0,"s":[0],"e":[360],"i":{"x":[1],"y":[1]},"o":{"x":[0],"y":[0]}},{"t":60,"s":[360]}]},"p":{"a":0,"k":[50,50,0]},"a":{"a":0,"k":[50,50,0]},"s":{"a":0,"k":[100,100,100]}},"ip":0,"op":60,"st":0,"shapes":[{"ty":"gr","nm":"Left Bracket","it":[{"ty":"sh","nm":"Path","ks":{"a":0,"k":{"i":[[0,0],[0,0],[0,0]],"o":[[0,0],[0,0],[0,0]],"v":[[25,25],[12.5,50],[25,75]],"c":false}}},{"ty":"st","nm":"Stroke","c":{"a":0,"k":[0,1,0.835,1]},"o":{"a":0,"k":100},"w":{"a":0,"k":10},"lc":2,"lj":2,"ml":4},{"ty":"tr","p":{"a":0,"k":[0,0]},"a":{"a":0,"k":[0,0]},"s":{"a":0,"k":[100,100]},"r":{"a":0,"k":0},"o":{"a":0,"k":100}}]},{"ty":"gr","nm":"Right Bracket","it":[{"ty":"sh","nm":"Path","ks":{"a":0,"k":{"i":[[0,0],[0,0],[0,0]],"o":[[0,0],[0,0],[0,0]],"v":[[75,25],[87.5,50],[75,75]],"c":false}}},{"ty":"st","nm":"Stroke","c":{"a":0,"k":[0.541,0.486,1,1]},"o":{"a":0,"k":100},"w":{"a":0,"k":10},"lc":2,"lj":2,"ml":4},{"ty":"tr","p":{"a":0,"k":[0,0]},"a":{"a":0,"k":[0,0]},"s":{"a":0,"k":[100,100]},"r":{"a":0,"k":0},"o":{"a":0,"k":100}}]}]}]};

const whiteData = JSON.parse(JSON.stringify(neonData));
whiteData.layers[0].shapes[0].it[1].c.k = [1,1,1,1];
whiteData.layers[0].shapes[1].it[1].c.k = [1,1,1,1];

['neon-20','neon-40','neon-80','neon-160'].forEach(id => {
  lottie.loadAnimation({ container: document.getElementById(id), animationData: neonData, renderer: 'svg', loop: true, autoplay: true });
});
['white-20','white-40','white-80','white-160'].forEach(id => {
  lottie.loadAnimation({ container: document.getElementById(id), animationData: whiteData, renderer: 'svg', loop: true, autoplay: true });
});
</script>
</body>
</html>
