<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="520" fill="#f7fbfd" rx="12"/>

  <!-- Title -->
  <text x="700" y="46" text-anchor="middle" font-size="20" font-weight="600" fill="#102432" letter-spacing="-0.3">Large File Token Reduction — Mesh Capsule Pipeline</text>
  <text x="700" y="70" text-anchor="middle" font-size="13" fill="#4a6070" letter-spacing="0">Tokens seen by the LLM as % of raw source — lower is better</text>

  <!-- Grid lines -->
  <line x1="140" y1="100" x2="1320" y2="100" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="160" x2="1320" y2="160" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="220" x2="1320" y2="220" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="280" x2="1320" y2="280" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="340" x2="1320" y2="340" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#e0ebf0" stroke-width="1"/>

  <!-- Y axis labels (0–100%) -->
  <text x="128" y="404" text-anchor="end" font-size="11" fill="#6b8496">0%</text>
  <text x="128" y="344" text-anchor="end" font-size="11" fill="#6b8496">20%</text>
  <text x="128" y="284" text-anchor="end" font-size="11" fill="#6b8496">40%</text>
  <text x="128" y="224" text-anchor="end" font-size="11" fill="#6b8496">60%</text>
  <text x="128" y="164" text-anchor="end" font-size="11" fill="#6b8496">80%</text>
  <text x="128" y="104" text-anchor="end" font-size="11" fill="#6b8496">100%</text>

  <!-- Baseline -->
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="140" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>

  <!-- Scale: 300px = 100%, so 1% = 3px. Bar height for X% = X * 3, bar y = 400 - (X*3) -->

  <!-- Group 1: Code (.ts) — raw 1149, capsule 77 = 6.7%, saved 93.3% -->
  <!-- Saved bar (teal, tall) -->
  <rect x="170" y="120" width="80" height="280" fill="#0f6a7b" rx="4" opacity="0.92"/>
  <!-- Remaining bar (light) -->
  <rect x="170" y="380" width="80" height="20" fill="#d4e8ed" rx="2"/>
  <!-- Label -->
  <text x="210" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Code</text>
  <text x="210" y="435" text-anchor="middle" font-size="11" fill="#4a6070">.ts</text>
  <!-- Savings % label above bar -->
  <text x="210" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">93.3%</text>
  <text x="210" y="129" text-anchor="middle" font-size="10" fill="#4a6070">saved</text>

  <!-- Group 2: Config (.yaml) — capsule 7.9%, saved 92.0% -->
  <rect x="390" y="124" width="80" height="276" fill="#0f6a7b" rx="4" opacity="0.92"/>
  <rect x="390" y="376" width="80" height="24" fill="#d4e8ed" rx="2"/>
  <text x="430" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Config</text>
  <text x="430" y="435" text-anchor="middle" font-size="11" fill="#4a6070">.yaml</text>
  <text x="430" y="119" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">92.0%</text>
  <text x="430" y="133" text-anchor="middle" font-size="10" fill="#4a6070">saved</text>

  <!-- Group 3: SQL (.sql) — capsule 6.5%, saved 93.6% -->
  <rect x="610" y="119" width="80" height="281" fill="#0f6a7b" rx="4" opacity="0.92"/>
  <rect x="610" y="380" width="80" height="20" fill="#d4e8ed" rx="2"/>
  <text x="650" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">SQL</text>
  <text x="650" y="435" text-anchor="middle" font-size="11" fill="#4a6070">.sql</text>
  <text x="650" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">93.6%</text>
  <text x="650" y="128" text-anchor="middle" font-size="10" fill="#4a6070">saved</text>

  <!-- Group 4: Markup (.html) — capsule 5.4%, saved 94.5% -->
  <rect x="830" y="117" width="80" height="284" fill="#0f6a7b" rx="4" opacity="0.92"/>
  <rect x="830" y="384" width="80" height="16" fill="#d4e8ed" rx="2"/>
  <text x="870" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Markup</text>
  <text x="870" y="435" text-anchor="middle" font-size="11" fill="#4a6070">.html</text>
  <text x="870" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">94.5%</text>
  <text x="870" y="126" text-anchor="middle" font-size="10" fill="#4a6070">saved</text>

  <!-- Group 5: Docs (.md) — capsule 4.4%, saved 95.6% -->
  <rect x="1050" y="114" width="80" height="287" fill="#0f6a7b" rx="4" opacity="0.92"/>
  <rect x="1050" y="387" width="80" height="13" fill="#d4e8ed" rx="2"/>
  <text x="1090" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Docs</text>
  <text x="1090" y="435" text-anchor="middle" font-size="11" fill="#4a6070">.md</text>
  <text x="1090" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">95.6%</text>
  <text x="1090" y="123" text-anchor="middle" font-size="10" fill="#4a6070">saved</text>

  <!-- Legend -->
  <rect x="490" y="468" width="14" height="14" fill="#0f6a7b" rx="2" opacity="0.92"/>
  <text x="510" y="480" font-size="12" fill="#4a6070">Tokens saved (capsule)</text>
  <rect x="700" y="468" width="14" height="14" fill="#d4e8ed" rx="2"/>
  <text x="720" y="480" font-size="12" fill="#4a6070">Tokens remaining (LLM sees)</text>

  <!-- Avg callout -->
  <rect x="1140" y="96" width="148" height="38" fill="#eaf4f7" rx="6" stroke="#c4dde5" stroke-width="1"/>
  <text x="1214" y="113" text-anchor="middle" font-size="11" fill="#4a6070">Average savings</text>
  <text x="1214" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#0f6a7b">93.8%</text>
</svg>
