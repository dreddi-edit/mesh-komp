<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="520" fill="#f7fbfd" rx="12"/>

  <!-- Title -->
  <text x="700" y="46" text-anchor="middle" font-size="20" font-weight="600" fill="#102432" letter-spacing="-0.3">Span Recovery — Exact Source Retrieved via Span IDs</text>
  <text x="700" y="70" text-anchor="middle" font-size="13" fill="#4a6070">Bytes recovered as % of raw file — 4 spans pulled per fixture. Smaller = more targeted recovery.</text>

  <!-- Grid lines (0–40%, 300px range, 1% = 7.5px) -->
  <line x1="140" y1="100" x2="1320" y2="100" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="175" x2="1320" y2="175" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="250" x2="1320" y2="250" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="325" x2="1320" y2="325" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#e0ebf0" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="128" y="404" text-anchor="end" font-size="11" fill="#6b8496">0%</text>
  <text x="128" y="329" text-anchor="end" font-size="11" fill="#6b8496">10%</text>
  <text x="128" y="254" text-anchor="end" font-size="11" fill="#6b8496">20%</text>
  <text x="128" y="179" text-anchor="end" font-size="11" fill="#6b8496">30%</text>
  <text x="128" y="104" text-anchor="end" font-size="11" fill="#6b8496">40%</text>

  <!-- Axis -->
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="140" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>

  <!-- Scale: 300px = 40%, so 1% = 7.5px. bar_height = val * 7.5, bar_y = 400 - val*7.5 -->

  <!-- ===== Code: 28.7%, 1319 bytes ===== -->
  <!-- 28.7 * 7.5 = 215.25 -->
  <rect x="186" y="185" width="88" height="215" fill="#0f6a7b" rx="4" opacity="0.88"/>
  <!-- Remaining (not recovered) -->
  <rect x="186" y="400" width="88" height="0" fill="#d4e8ed" rx="2"/>
  <text x="230" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">28.7%</text>
  <text x="230" y="194" text-anchor="middle" font-size="10" fill="#4a6070">1,319 bytes</text>
  <text x="230" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Code</text>
  <text x="230" y="445" text-anchor="middle" font-size="11" fill="#4a6070">.ts · 4 spans</text>
  <!-- Span annotation -->
  <text x="230" y="462" text-anchor="middle" font-size="10" fill="#8cb8c4">function bodies</text>

  <!-- ===== Config: 2.1%, 47 bytes ===== -->
  <!-- 2.1 * 7.5 = 15.75 -->
  <rect x="406" y="384" width="88" height="16" fill="#0f6a7b" rx="4" opacity="0.88"/>
  <text x="450" y="379" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">2.1%</text>
  <text x="450" y="393" text-anchor="middle" font-size="10" fill="#4a6070">47 bytes</text>
  <text x="450" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Config</text>
  <text x="450" y="445" text-anchor="middle" font-size="11" fill="#4a6070">.yaml · 4 spans</text>
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#8cb8c4">key-value pairs</text>

  <!-- ===== SQL: 33.4%, 1325 bytes ===== -->
  <!-- 33.4 * 7.5 = 250.5 -->
  <rect x="626" y="150" width="88" height="250" fill="#0f6a7b" rx="4" opacity="0.88"/>
  <text x="670" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">33.4%</text>
  <text x="670" y="159" text-anchor="middle" font-size="10" fill="#4a6070">1,325 bytes</text>
  <text x="670" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">SQL</text>
  <text x="670" y="445" text-anchor="middle" font-size="11" fill="#4a6070">.sql · 4 spans</text>
  <text x="670" y="462" text-anchor="middle" font-size="10" fill="#8cb8c4">view definitions</text>

  <!-- ===== Markup: 2.9%, 95 bytes ===== -->
  <!-- 2.9 * 7.5 = 21.75 -->
  <rect x="846" y="378" width="88" height="22" fill="#0f6a7b" rx="4" opacity="0.88"/>
  <text x="890" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">2.9%</text>
  <text x="890" y="387" text-anchor="middle" font-size="10" fill="#4a6070">95 bytes</text>
  <text x="890" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Markup</text>
  <text x="890" y="445" text-anchor="middle" font-size="11" fill="#4a6070">.html · 4 spans</text>
  <text x="890" y="462" text-anchor="middle" font-size="10" fill="#8cb8c4">element attributes</text>

  <!-- ===== Docs: 23.1%, 959 bytes ===== -->
  <!-- 23.1 * 7.5 = 173.25 -->
  <rect x="1066" y="227" width="88" height="173" fill="#0f6a7b" rx="4" opacity="0.88"/>
  <text x="1110" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">23.1%</text>
  <text x="1110" y="236" text-anchor="middle" font-size="10" fill="#4a6070">959 bytes</text>
  <text x="1110" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Docs</text>
  <text x="1110" y="445" text-anchor="middle" font-size="11" fill="#4a6070">.md · 4 spans</text>
  <text x="1110" y="462" text-anchor="middle" font-size="10" fill="#8cb8c4">section blocks</text>

  <!-- Callout box -->
  <rect x="156" y="480" width="1088" height="30" fill="#eaf4f7" rx="6" stroke="#c4dde5" stroke-width="1"/>
  <text x="700" y="500" text-anchor="middle" font-size="12" fill="#4a6070">Pattern: reason with compressed capsule first → pull exact source spans only when task demands precision</text>
</svg>
