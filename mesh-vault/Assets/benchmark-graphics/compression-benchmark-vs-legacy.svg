<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 540" width="1400" height="540" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="540" fill="#f7fbfd" rx="12"/>

  <!-- Title -->
  <text x="700" y="46" text-anchor="middle" font-size="20" font-weight="600" fill="#102432" letter-spacing="-0.3">Capsule Pipeline vs Legacy llm-compress — Large Files</text>
  <text x="700" y="70" text-anchor="middle" font-size="13" fill="#4a6070">Token ratio as % of raw — lower is better. AST awareness vs line-based heuristics.</text>

  <!-- Grid lines (y=100 to y=400, 300px = 25%) -->
  <!-- Scale: 300px total, 0–25% range. 1% = 12px -->
  <line x1="140" y1="100" x2="1320" y2="100" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="160" x2="1320" y2="160" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="220" x2="1320" y2="220" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="280" x2="1320" y2="280" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="340" x2="1320" y2="340" stroke="#e0ebf0" stroke-width="1"/>
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#e0ebf0" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="128" y="404" text-anchor="end" font-size="11" fill="#6b8496">0%</text>
  <text x="128" y="344" text-anchor="end" font-size="11" fill="#6b8496">5%</text>
  <text x="128" y="284" text-anchor="end" font-size="11" fill="#6b8496">10%</text>
  <text x="128" y="224" text-anchor="end" font-size="11" fill="#6b8496">15%</text>
  <text x="128" y="164" text-anchor="end" font-size="11" fill="#6b8496">20%</text>
  <text x="128" y="104" text-anchor="end" font-size="11" fill="#6b8496">25%</text>

  <!-- Baseline -->
  <line x1="140" y1="400" x2="1320" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="140" y2="400" stroke="#b0c8d4" stroke-width="1.5"/>

  <!-- Scale: 300px = 25%, so 1% = 12px. bar_height = val * 12. bar_y = 400 - (val * 12) -->

  <!-- ===== Code (.ts): Capsule 6.7%, Legacy 19.5% ===== -->
  <!-- Capsule bar: 6.7 * 12 = 80.4px -->
  <rect x="170" y="320" width="56" height="80" fill="#0f6a7b" rx="4"/>
  <text x="198" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6a7b">6.7%</text>
  <!-- Legacy bar: 19.5 * 12 = 234px -->
  <rect x="234" y="166" width="56" height="234" fill="#8cb8c4" rx="4" opacity="0.7"/>
  <text x="262" y="161" text-anchor="middle" font-size="12" font-weight="600" fill="#8cb8c4">19.5%</text>
  <!-- Advantage badge -->
  <rect x="170" y="442" width="120" height="22" fill="#eaf4f7" rx="4" stroke="#c4dde5" stroke-width="1"/>
  <text x="230" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6a7b">2.9× better</text>
  <!-- X label -->
  <text x="230" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Code</text>
  <text x="230" y="497" text-anchor="middle" font-size="11" fill="#4a6070">.ts</text>

  <!-- ===== Config (.yaml): Capsule 7.9%, Legacy 19.6% ===== -->
  <rect x="390" y="305" width="56" height="95" fill="#0f6a7b" rx="4"/>
  <text x="418" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6a7b">7.9%</text>
  <rect x="454" y="165" width="56" height="235" fill="#8cb8c4" rx="4" opacity="0.7"/>
  <text x="482" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#8cb8c4">19.6%</text>
  <rect x="390" y="442" width="120" height="22" fill="#eaf4f7" rx="4" stroke="#c4dde5" stroke-width="1"/>
  <text x="450" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6a7b">2.5× better</text>
  <text x="450" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Config</text>
  <text x="450" y="497" text-anchor="middle" font-size="11" fill="#4a6070">.yaml</text>

  <!-- ===== SQL (.sql): Capsule 6.5%, Legacy 9.7% ===== -->
  <rect x="610" y="322" width="56" height="78" fill="#0f6a7b" rx="4"/>
  <text x="638" y="317" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6a7b">6.5%</text>
  <rect x="674" y="284" width="56" height="116" fill="#8cb8c4" rx="4" opacity="0.7"/>
  <text x="702" y="279" text-anchor="middle" font-size="12" font-weight="600" fill="#8cb8c4">9.7%</text>
  <rect x="610" y="442" width="120" height="22" fill="#eaf4f7" rx="4" stroke="#c4dde5" stroke-width="1"/>
  <text x="670" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6a7b">1.5× better</text>
  <text x="670" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">SQL</text>
  <text x="670" y="497" text-anchor="middle" font-size="11" fill="#4a6070">.sql</text>

  <!-- ===== Markup (.html): Capsule 5.4%, Legacy 20.0% ===== -->
  <rect x="830" y="335" width="56" height="65" fill="#0f6a7b" rx="4"/>
  <text x="858" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6a7b">5.4%</text>
  <rect x="894" y="160" width="56" height="240" fill="#8cb8c4" rx="4" opacity="0.7"/>
  <text x="922" y="155" text-anchor="middle" font-size="12" font-weight="600" fill="#8cb8c4">20.0%</text>
  <rect x="830" y="442" width="120" height="22" fill="#eaf4f7" rx="4" stroke="#c4dde5" stroke-width="1"/>
  <text x="890" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6a7b">3.7× better</text>
  <text x="890" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Markup</text>
  <text x="890" y="497" text-anchor="middle" font-size="11" fill="#4a6070">.html</text>

  <!-- ===== Docs (.md): Capsule 4.4%, Legacy 11.5% ===== -->
  <rect x="1050" y="347" width="56" height="53" fill="#0f6a7b" rx="4"/>
  <text x="1078" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6a7b">4.4%</text>
  <rect x="1114" y="262" width="56" height="138" fill="#8cb8c4" rx="4" opacity="0.7"/>
  <text x="1142" y="257" text-anchor="middle" font-size="12" font-weight="600" fill="#8cb8c4">11.5%</text>
  <rect x="1050" y="442" width="120" height="22" fill="#eaf4f7" rx="4" stroke="#c4dde5" stroke-width="1"/>
  <text x="1110" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6a7b">2.6× better</text>
  <text x="1110" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#102432">Docs</text>
  <text x="1110" y="497" text-anchor="middle" font-size="11" fill="#4a6070">.md</text>

  <!-- Legend -->
  <rect x="442" y="514" width="14" height="14" fill="#0f6a7b" rx="2"/>
  <text x="462" y="526" font-size="12" fill="#4a6070">Mesh Capsule</text>
  <rect x="610" y="514" width="14" height="14" fill="#8cb8c4" rx="2" opacity="0.7"/>
  <text x="630" y="526" font-size="12" fill="#4a6070">Legacy llm-compress</text>
  <rect x="820" y="514" width="14" height="14" fill="#eaf4f7" rx="2" stroke="#c4dde5" stroke-width="1"/>
  <text x="840" y="526" font-size="12" fill="#4a6070">Capsule advantage</text>
</svg>
