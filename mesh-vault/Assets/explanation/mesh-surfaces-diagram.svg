<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="400" fill="#f7fbfd" rx="12"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="16" font-weight="600" fill="#102432">Three Surfaces — One Shared Workspace</text>

  <!-- Shared workspace box (center, bottom) -->
  <rect x="400" y="295" width="400" height="72" fill="#0f6a7b" rx="8" opacity="0.12" stroke="#0f6a7b" stroke-width="1.5"/>
  <text x="600" y="324" text-anchor="middle" font-size="13" font-weight="700" fill="#0f6a7b">Indexed Workspace</text>
  <text x="600" y="341" text-anchor="middle" font-size="11" fill="#4a6070">Capsule pipeline · Tree-sitter AST · Span index</text>
  <text x="600" y="357" text-anchor="middle" font-size="11" fill="#4a6070">All surfaces share the same compressed context</text>

  <!-- Connector lines up to surfaces -->
  <line x1="600" y1="295" x2="200" y2="215" stroke="#b0c8d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="295" x2="600" y2="215" stroke="#b0c8d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="295" x2="1000" y2="215" stroke="#b0c8d4" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== Editor Surface ===== -->
  <rect x="60" y="70" width="280" height="145" fill="white" rx="10" stroke="#c4dde5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="70" width="280" height="36" fill="#0f6a7b" rx="10 10 0 0"/>
  <text x="200" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Editor</text>
  <text x="200" y="130" text-anchor="middle" font-size="11" fill="#102432">VS Code-style workbench</text>
  <text x="200" y="147" text-anchor="middle" font-size="11" fill="#4a6070">Monaco · File explorer</text>
  <text x="200" y="164" text-anchor="middle" font-size="11" fill="#4a6070">Dependency graph · Chat panel</text>
  <text x="200" y="181" text-anchor="middle" font-size="11" fill="#4a6070">AI has full workspace context</text>
  <rect x="80" y="195" width="240" height="8" fill="#eaf4f7" rx="4"/>

  <!-- ===== Terminal Surface ===== -->
  <rect x="460" y="70" width="280" height="145" fill="white" rx="10" stroke="#c4dde5" stroke-width="1.5"/>
  <rect x="460" y="70" width="280" height="36" fill="#102432" rx="10 10 0 0"/>
  <text x="600" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Terminal</text>
  <text x="600" y="130" text-anchor="middle" font-size="11" fill="#102432">Full-page terminal (xterm.js)</text>
  <text x="600" y="147" text-anchor="middle" font-size="11" fill="#4a6070">Run commands · See output</text>
  <text x="600" y="164" text-anchor="middle" font-size="11" fill="#4a6070">AI explains what happened</text>
  <text x="600" y="181" text-anchor="middle" font-size="11" fill="#4a6070">Tied to active workspace</text>
  <rect x="480" y="195" width="240" height="8" fill="#eaf4f7" rx="4"/>

  <!-- ===== Voice Surface ===== -->
  <rect x="860" y="70" width="280" height="145" fill="white" rx="10" stroke="#c4dde5" stroke-width="1.5"/>
  <rect x="860" y="70" width="280" height="36" fill="#1a3d52" rx="10 10 0 0"/>
  <text x="1000" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Voice</text>
  <text x="1000" y="130" text-anchor="middle" font-size="11" fill="#102432">Speech-first agent mode</text>
  <text x="1000" y="147" text-anchor="middle" font-size="11" fill="#4a6070">Speak → Transcribe → AI → Polly</text>
  <text x="1000" y="164" text-anchor="middle" font-size="11" fill="#4a6070">Read files · Edit code · Git ops</text>
  <text x="1000" y="181" text-anchor="middle" font-size="11" fill="#4a6070">Delegate long tasks to typed agent</text>
  <rect x="880" y="195" width="240" height="8" fill="#eaf4f7" rx="4"/>

  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#102432" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>
