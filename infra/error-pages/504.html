<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>504 — Mesh request timed out</title>
  <style>
    :root {
      --bg:         #0d0d0f;
      --surface:    #161618;
      --border:     #2a2a2e;
      --text:       #e8e8ea;
      --muted:      #888892;
      --accent:     #6b7fff;
      --accent-dim: rgba(107,127,255,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .logo-name {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .code {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: rgba(107,127,255,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2L16 6V12L9 16L2 12V6L9 2Z" stroke="#6b7fff" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="9" cy="9" r="2.5" fill="#6b7fff" opacity="0.7"/>
        </svg>
      </div>
      <span class="logo-name">Mesh</span>
    </div>
    <div class="code">504</div>
    <h1>Request timed out</h1>
    <p>The server took too long to respond. This can happen during heavy AI inference or workspace indexing. Try again in a few seconds.</p>
    <a class="btn" href="javascript:location.reload()">Retry</a>
  </div>
</body>
</html>
