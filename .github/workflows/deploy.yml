name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Rsync code to EC2
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete
            --exclude='node_modules'
            --exclude='.git'
            --exclude='.env'
            --exclude='*.png'
            --exclude='*.jpg'
            --exclude='.playwright-mcp'
            --exclude='.superpowers'
            --exclude='docs/benchmark-results'
          path: ./
          remote_path: /home/ec2-user/app/
          remote_host: 50.16.15.217
          remote_user: ec2-user
          remote_key: ${{ secrets.EC2_SSH_KEY }}

      - name: Upload CloudFront error pages to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [ -z "$S3_BUCKET" ]; then
            echo "S3_BUCKET secret not set — skipping error page upload"
            exit 0
          fi
          ./infra/deploy-error-pages.sh "$S3_BUCKET"

      - name: Install deps and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 50.16.15.217
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /home/ec2-user/app
            npm ci --ignore-scripts
            npm rebuild node-pty --build-from-source
            pm2 reload ecosystem.config.js --env production 2>/dev/null || pm2 start ecosystem.config.js --env production
            pm2 save
            sleep 3
            curl -sf http://localhost:8080/healthz | grep '"service"'
            echo "Deploy successful"
