name: Deploy to Azure Web App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Create deployment zip
        run: |
          zip -rq deploy.zip . \
            -x "node_modules/*" \
            -x "mesh-core/node_modules/*" \
            -x ".git/*" \
            -x ".mesh*" \
            -x "*.DS_Store" \
            -x "*.log" \
            -x "archive/*" \
            -x "output/*" \
            -x ".playwright-cli/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mesh-gateway-303137'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
